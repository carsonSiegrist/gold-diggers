<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Mining Claims Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
  />

  <style>
    html,
    body,
    #map {
      height: 100%;
      margin: 0;
    }

    .legend {
      background: white;
      bottom: 16px;
      box-shadow: 0 2px 8px rgb(0 0 0 / 20%);
      color: #111827;
      font: 14px Arial, sans-serif;
      left: 16px;
      padding: 8px 10px;
      position: absolute;
      z-index: 500;
    }

    .profile-picker {
      background: white;
      box-shadow: 0 2px 8px rgb(0 0 0 / 20%);
      color: #111827;
      font: 14px Arial, sans-serif;
      padding: 8px 10px;
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 500;
    }

    .auth-panel {
      background: white;
      box-shadow: 0 2px 14px rgb(0 0 0 / 24%);
      color: #111827;
      font: 14px Arial, sans-serif;
      left: 50%;
      max-width: calc(100% - 32px);
      padding: 14px;
      position: absolute;
      top: 16px;
      transform: translateX(-50%);
      width: 320px;
      z-index: 800;
    }

    .auth-panel[hidden],
    .account-panel[hidden] {
      display: none;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin-bottom: 12px;
    }

    .auth-tabs button,
    .auth-panel button,
    .account-panel button {
      background: #111827;
      border: 1px solid #111827;
      color: white;
      cursor: pointer;
      font: inherit;
      padding: 7px 10px;
    }

    .auth-tabs button {
      background: white;
      color: #111827;
    }

    .auth-tabs button.active {
      background: #111827;
      color: white;
    }

    .auth-panel label {
      display: block;
      font-size: 12px;
      margin: 8px 0 4px;
    }

    .auth-panel input {
      border: 1px solid #d1d5db;
      box-sizing: border-box;
      color: #111827;
      font: inherit;
      padding: 7px 8px;
      width: 100%;
    }

    .auth-panel .submit-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .auth-panel .submit-row button {
      flex: 1;
    }

    .auth-error {
      color: #b91c1c;
      min-height: 18px;
      margin: 8px 0 0;
    }

    .account-panel {
      background: white;
      box-shadow: 0 2px 8px rgb(0 0 0 / 20%);
      color: #111827;
      font: 14px Arial, sans-serif;
      padding: 8px 10px;
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 500;
    }

    .account-panel strong {
      display: block;
      margin-bottom: 6px;
    }

    .site-picker {
      background: white;
      box-shadow: 0 2px 8px rgb(0 0 0 / 20%);
      color: #111827;
      font: 14px Arial, sans-serif;
      padding: 8px 10px;
      position: absolute;
      right: 16px;
      top: 90px;
      z-index: 500;
    }

    .claim-picker {
      background: white;
      box-shadow: 0 2px 8px rgb(0 0 0 / 20%);
      color: #111827;
      font: 14px Arial, sans-serif;
      padding: 8px 10px;
      position: absolute;
      right: 16px;
      top: 156px;
      z-index: 500;
    }

    .profile-picker label,
    .site-picker label,
    .claim-picker label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .profile-picker select,
    .site-picker select,
    .claim-picker select {
      background: white;
      border: 1px solid #d1d5db;
      color: #111827;
      font: inherit;
      min-width: 160px;
      padding: 4px 6px;
    }

    .swatch {
      display: inline-block;
      height: 10px;
      margin-right: 6px;
      width: 10px;
    }

    .open {
      background: #16a34a;
    }

    .closed {
      background: #dc2626;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <form id="authPanel" class="auth-panel">
    <div class="auth-tabs">
      <button type="button" id="loginTab" class="active">Log in</button>
      <button type="button" id="signupTab">Sign up</button>
    </div>
    <div id="nameField" hidden>
      <label for="nameInput">Name</label>
      <input id="nameInput" autocomplete="name" />
    </div>
    <label for="emailInput">Email</label>
    <input id="emailInput" type="text" inputmode="email" autocomplete="email" required />
    <label for="passwordInput">Password</label>
    <input id="passwordInput" type="password" autocomplete="current-password" required />
    <div class="submit-row">
      <button id="authSubmit" type="submit">Log in</button>
    </div>
    <p id="authError" class="auth-error"></p>
  </form>
  <div id="accountPanel" class="account-panel" hidden>
    <strong id="accountName">Signed in</strong>
    <button id="logoutButton" type="button">Log out</button>
  </div>
  <div class="site-picker">
    <label for="siteSelect">Saved site</label>
    <select id="siteSelect">
      <option value="">Loading sites...</option>
    </select>
  </div>
  <div class="claim-picker">
    <label for="claimSelect">Saved mining claim</label>
    <select id="claimSelect">
      <option value="">Loading claims...</option>
    </select>
  </div>
  <div class="legend">
    <strong>Availability</strong><br>
    <span class="swatch open"></span> Open<br>
    <span class="swatch closed"></span> Closed<br>
    <hr style="margin: 5px 0;">
    <strong>Claim Type</strong><br>
    <div style="border: 3px solid #666; width: 20px; display: inline-block; margin-right: 5px;"></div> Placer<br>
    <div style="border: 2px dashed #666; width: 20px; display: inline-block; margin-right: 5px;"></div> Lode
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="app.js"></script>
</body>
</html>
